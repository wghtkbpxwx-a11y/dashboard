<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Dashboard</title>
<style>
:root {
  --bg:        #0c0c0e;
  --bg2:       #131316;
  --bg3:       #1a1a1e;
  --bg4:       #232328;
  --bg5:       #2c2c32;
  --line:      rgba(255,255,255,0.065);
  --line2:     rgba(255,255,255,0.11);
  --t1:        #eaeaec;
  --t2:        #8a8a94;
  --t3:        #4e4e58;
  --accent:    #5b9cf6;
  --accent-bg: rgba(91,156,246,0.10);
  --accent-b:  rgba(91,156,246,0.28);
  --red:       #e05252;
  --r: 9px;
  --rs: 6px;
  --f: -apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue',sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html{background:var(--bg)}
body{
  background:var(--bg);
  color:var(--t1);
  font-family:var(--f);
  min-height:100dvh;
  -webkit-font-smoothing:antialiased;
  overscroll-behavior:none;
  max-width:540px;
  margin:0 auto;
}
a{color:inherit;text-decoration:none}
button{font-family:var(--f);cursor:pointer}

/* ── STATUS BAR ── */
#status{
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:env(safe-area-inset-top,12px) 20px 12px;
  border-bottom:1px solid var(--line);
  position:sticky;
  top:0;
  z-index:200;
  background:var(--bg);
  backdrop-filter:blur(20px);
}
#s-left{display:flex;flex-direction:column;gap:2px}
#s-time{font-size:32px;font-weight:300;letter-spacing:-0.6px;line-height:1}
#s-date{font-size:14px;letter-spacing:0.8px;text-transform:uppercase;color:var(--t3)}
#s-right{display:flex;gap:14px;align-items:center}
.s-chip{font-size:15px;color:var(--t2);letter-spacing:0.2px}
.s-chip.live{color:var(--accent);display:flex;align-items:center;gap:5px}
.live-dot{
  width:6px;height:6px;border-radius:50%;
  background:var(--accent);
  animation:blink 2.4s infinite;
}
@keyframes blink{0%,100%{opacity:1}55%{opacity:0.25}}

/* ── MODE NAV ── */
#modenav{
  display:flex;
  gap:2px;
  padding:10px 14px;
  overflow-x:auto;
  scrollbar-width:none;
  border-bottom:1px solid var(--line);
  position:sticky;
  top:62px;
  z-index:199;
  background:var(--bg);
}
#modenav::-webkit-scrollbar{display:none}
.modebt{
  flex-shrink:0;
  padding:9px 20px;
  border-radius:20px;
  border:none;
  background:transparent;
  color:var(--t3);
  font-size:16px;
  font-weight:500;
  letter-spacing:0.5px;
  text-transform:uppercase;
  transition:color .18s,background .18s;
}
.modebt.on{background:var(--bg4);color:var(--t1)}
.modebt:hover:not(.on){color:var(--t2)}

/* ── PANELS ── */
#content{padding-bottom:env(safe-area-inset-bottom,24px)}
.panel{display:none;animation:fadeIn .2s ease}
.panel.on{display:block}
@keyframes fadeIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}

/* ── SHARED COMPONENTS ── */
.sec{
  padding:22px 20px 9px;
  font-size:13px;
  font-weight:600;
  letter-spacing:1.1px;
  text-transform:uppercase;
  color:var(--t3);
}
.row{
  display:flex;
  align-items:center;
  padding:18px 20px;
  border-bottom:1px solid var(--line);
  gap:16px;
  cursor:pointer;
  transition:background .14s;
  color:inherit;
}
.row:hover,.row:active{background:var(--bg2)}
.icon{
  width:46px;height:46px;border-radius:11px;
  background:var(--bg3);
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;font-size:21px;
}
.icon.accent{background:var(--accent-bg);border:1px solid var(--accent-b)}
.rl{flex:1;min-width:0}
.rl-t{font-size:19px;font-weight:500;color:var(--t1);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.rl-s{font-size:14px;color:var(--t3);margin-top:3px}
.chev{color:var(--t3);font-size:20px;line-height:1;flex-shrink:0}

/* ── INNER TABS ── */
.itabs{
  display:flex;
  padding:0 20px;
  border-bottom:1px solid var(--line);
  gap:0;
}
.itab{
  padding:16px 0;
  margin-right:28px;
  font-size:17px;
  font-weight:500;
  color:var(--t3);
  cursor:pointer;
  border-bottom:2px solid transparent;
  transition:color .18s,border-color .18s;
  letter-spacing:0.1px;
}
.itab.on{color:var(--t1);border-bottom-color:var(--accent)}

/* ── NEWS HEADLINES ── */
.hl{
  padding:16px 20px;
  border-bottom:1px solid var(--line);
  cursor:pointer;
  transition:background .14s;
  display:block;
}
.hl:hover,.hl:active{background:var(--bg2)}
.hl-t{font-size:18px;line-height:1.45;color:var(--t1);font-weight:400}
.hl-m{font-size:14px;color:var(--t3);margin-top:6px;display:flex;gap:6px}
.src-tag{color:var(--t2)}

/* ── TEAM CHIPS ── */
.teamfilter{
  display:flex;gap:7px;
  padding:12px 16px;
  overflow-x:auto;scrollbar-width:none;
  border-bottom:1px solid var(--line);
}
.teamfilter::-webkit-scrollbar{display:none}
.tchip{
  flex-shrink:0;
  padding:8px 16px;
  border-radius:16px;
  border:1px solid var(--line2);
  background:transparent;
  color:var(--t2);
  font-size:15px;
  font-weight:500;
  letter-spacing:0.3px;
  transition:all .18s;
}
.tchip.on{
  background:var(--accent-bg);
  border-color:var(--accent-b);
  color:var(--accent);
}

/* ── SCORE CARD ── */
.scard{
  margin:12px 16px;
  padding:16px 18px;
  background:var(--bg2);
  border:1px solid var(--line2);
  border-radius:var(--r);
}
.scard-hd{
  font-size:13px;text-transform:uppercase;letter-spacing:0.9px;
  color:var(--t3);margin-bottom:12px;display:flex;align-items:center;gap:7px;
}
.steams{display:flex;align-items:center;justify-content:space-between}
.steam{text-align:center;flex:1}
.steam-n{font-size:16px;font-weight:500;color:var(--t2);letter-spacing:0.3px}
.steam-s{font-size:44px;font-weight:200;letter-spacing:-1.5px;color:var(--t1);line-height:1.1}
.sdash{font-size:15px;color:var(--t3);padding:0 10px}

/* ── CAPTURE ── */
.capwrap{padding:16px}
.capbox{
  width:100%;
  background:var(--bg2);
  border:1px solid var(--line2);
  border-radius:var(--r);
  color:var(--t1);
  font-family:var(--f);
  font-size:18px;
  line-height:1.5;
  padding:16px 18px;
  min-height:140px;
  resize:none;
  outline:none;
  transition:border-color .2s;
}
.capbox:focus{border-color:var(--accent)}
.capbox::placeholder{color:var(--t3)}
.capbtns{display:flex;gap:8px;margin-top:10px}
.btn{
  padding:13px 20px;border-radius:var(--rs);
  border:none;font-size:16px;font-weight:500;
  transition:opacity .15s,background .15s;
}
.btn-pri{background:var(--accent);color:#fff}
.btn-pri:hover{opacity:0.88}
.btn-ghost{background:var(--bg3);color:var(--t2);border:1px solid var(--line2)}
.btn-ghost:hover{background:var(--bg4)}
.btn-voice{
  background:var(--bg3);color:var(--t2);
  border:1px solid var(--line2);
  display:flex;align-items:center;gap:5px;
  margin-left:auto;
}
.btn-voice.rec{
  background:rgba(224,82,82,0.10);
  color:var(--red);
  border-color:rgba(224,82,82,0.28);
}

/* ── NOTES LIST ── */
.noterow{
  display:flex;align-items:flex-start;
  padding:13px 20px;border-bottom:1px solid var(--line);
  gap:10px;
}
.note-time{font-size:13px;color:var(--t3);flex-shrink:0;padding-top:3px;letter-spacing:0.3px}
.note-text{flex:1;font-size:16px;color:var(--t2);line-height:1.45}
.note-del{
  background:none;border:none;
  color:var(--t3);font-size:20px;line-height:1;
  flex-shrink:0;padding:0;cursor:pointer;
  transition:color .15s;
}
.note-del:hover{color:var(--red)}

/* ── DIVIDER ── */
.divider{height:1px;background:var(--line);margin:4px 0}

/* ── EMPTY ── */
.empty{padding:24px;font-size:15px;color:var(--t3);text-align:center}

/* ── SCROLLBAR ── */
::-webkit-scrollbar{width:3px;height:3px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--bg5);border-radius:3px}
</style>
</head>
<body>

<!-- ══ STATUS BAR ══ -->
<header id="status">
  <div id="s-left">
    <div id="s-time">--:--</div>
    <div id="s-date">———</div>
  </div>
  <div id="s-right">
    <span class="s-chip" id="s-weather">— °</span>
    <span class="s-chip live"><span class="live-dot"></span>Live</span>
  </div>
</header>

<!-- ══ MODE NAV ══ -->
<nav id="modenav">
  <button class="modebt on" data-p="live">Live</button>
  <button class="modebt" data-p="msg">Messages</button>
  <button class="modebt" data-p="cap">Capture</button>
</nav>

<main id="content">

<!-- ══════════════════════════
     LIVE PANEL (NEWS + SPORTS)
══════════════════════════ -->
<section class="panel on" id="panel-live">

  <div class="itabs">
    <div class="itab on" data-sub="news">News</div>
    <div class="itab" data-sub="sports">Sports</div>
  </div>

  <!-- News sub-panel -->
  <div id="sub-news">
    <div style="padding:14px 20px 4px;display:flex;align-items:center;gap:8px">
      <span class="live-dot"></span>
      <span style="font-size:13px;letter-spacing:1px;text-transform:uppercase;color:var(--t3)">Headlines</span>
    </div>
    <div id="news-list"></div>
  </div>

  <!-- Sports sub-panel -->
  <div id="sub-sports" style="display:none">
    <div class="teamfilter">
      <button class="tchip on" data-team="all">All</button>
      <button class="tchip" data-team="canucks">Canucks</button>
      <button class="tchip" data-team="seahawks">Seahawks</button>
      <button class="tchip" data-team="bclions">BC Lions</button>
      <button class="tchip" data-team="bluejays">Blue Jays</button>
      <button class="tchip" data-team="raptors">Raptors</button>
    </div>
    <div id="sports-list"></div>
  </div>

</section>

<!-- ══════════════════════════
     MESSAGES PANEL
══════════════════════════ -->
<section class="panel" id="panel-msg">

  <div class="sec">Messaging</div>
  <a class="row" href="https://web.whatsapp.com" target="_blank">
    <div class="icon">💬</div>
    <div class="rl"><div class="rl-t">WhatsApp</div><div class="rl-s">Open chats</div></div>
    <span class="chev">›</span>
  </a>
  <a class="row" href="https://web.telegram.org" target="_blank">
    <div class="icon">✈</div>
    <div class="rl"><div class="rl-t">Telegram</div><div class="rl-s">Open chats</div></div>
    <span class="chev">›</span>
  </a>
  <a class="row" href="https://www.messenger.com" target="_blank">
    <div class="icon">💙</div>
    <div class="rl"><div class="rl-t">Messenger</div><div class="rl-s">Facebook Messenger</div></div>
    <span class="chev">›</span>
  </a>

  <div class="sec">Email</div>
  <a class="row" href="https://mail.google.com" target="_blank">
    <div class="icon">📧</div>
    <div class="rl"><div class="rl-t">Gmail</div><div class="rl-s">Open inbox</div></div>
    <span class="chev">›</span>
  </a>

</section>

<!-- ══════════════════════════
     CAPTURE PANEL
══════════════════════════ -->
<section class="panel" id="panel-cap">

  <div class="capwrap">
    <textarea
      class="capbox"
      id="cap-input"
      placeholder="Speak or type a thought…"
      rows="5"
      autocorrect="on"
      autocapitalize="sentences"
    ></textarea>
    <div class="capbtns">
      <button class="btn btn-pri" onclick="saveNote()">Save</button>
      <button class="btn btn-ghost" onclick="clearCap()">Clear</button>
      <button class="btn btn-voice btn-ghost" id="voice-btn" onclick="toggleVoice()">🎤 Dictate</button>
    </div>
  </div>

  <div class="sec">Saved</div>
  <div id="notes-list"></div>

</section>

</main>

<script>
// ── CLOCK ────────────────────────────────────────────
function tick(){
  const n=new Date();
  const h=String(n.getHours()).padStart(2,'0');
  const m=String(n.getMinutes()).padStart(2,'0');
  const ts=h+':'+m;
  const ds=n.toLocaleDateString('en-CA',{weekday:'short',month:'short',day:'numeric'}).toUpperCase();
  document.getElementById('s-time').textContent=ts;
  document.getElementById('s-date').textContent=ds;
}
tick();setInterval(tick,15000);

// ── WEATHER (optional) ─────────────────────────────
// SWAP: Replace with your OpenWeatherMap or WeatherAPI key + coordinates
/*
async function loadWeather(){
  try{
    const r=await fetch('YOUR_WEATHER_API_URL');
    const d=await r.json();
    const temp=Math.round(d.main.temp)+'°C';
    const cond=d.weather[0].main;
    document.getElementById('s-weather').textContent=temp+' · '+cond;
  }catch(e){}
}
loadWeather();
*/

// ── PANEL SWITCHING ────────────────────────────────────
function switchPanel(id){
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('on'));
  document.querySelectorAll('.modebt').forEach(b=>b.classList.remove('on'));
  document.getElementById('panel-'+id).classList.add('on');
  document.querySelector('[data-p="'+id+'"]').classList.add('on');
}
document.querySelectorAll('.modebt').forEach(btn=>{
  btn.addEventListener('click',()=>switchPanel(btn.dataset.p));
});

// ── INNER TABS ───────────────────────────────────────────
document.querySelectorAll('.itab').forEach(tab=>{
  tab.addEventListener('click',()=>{
    document.querySelectorAll('.itab').forEach(t=>t.classList.remove('on'));
    tab.classList.add('on');
    document.getElementById('sub-news').style.display=tab.dataset.sub==='news'?'block':'none';
    document.getElementById('sub-sports').style.display=tab.dataset.sub==='sports'?'block':'none';
  });
});

// ── TEAM FILTER ──────────────────────────────────────────
let activeTeam='all';
document.querySelectorAll('.tchip').forEach(c=>{
  c.addEventListener('click',()=>{
    document.querySelectorAll('.tchip').forEach(x=>x.classList.remove('on'));
    c.classList.add('on');
    activeTeam=c.dataset.team;
    renderSports();
  });
});

// ── NEWS DATA ────────────────────────────────────────────
const NEWS=[
  {hl:'Federal budget passes third reading amid housing and infrastructure debate',src:'CBC',age:'8m',url:'https://cbc.ca'},
  {hl:'Bank of Canada holds rates steady, signals cautious outlook through year-end',src:'Globe & Mail',age:'31m',url:'https://theglobeandmail.com'},
  {hl:'Vancouver home sales edge higher but prices remain below year-ago levels',src:'Vancouver Sun',age:'1h',url:'https://vancouversun.com'},
  {hl:'Trans Mountain pipeline expansion reaches full operational capacity',src:'CBC BC',age:'2h',url:'https://cbc.ca/bc'},
  {hl:'US-Canada trade framework talks advance; auto sector exemptions near deal',src:'Reuters',age:'3h',url:'https://reuters.com'},
  {hl:'Pacific Northwest drought conditions worsen as June heat ridge builds',src:'Seattle Times',age:'4h',url:'https://seattletimes.com'},
  {hl:'AI hiring surge slows as enterprise budgets reset for second half of year',src:'The Verge',age:'5h',url:'https://theverge.com'},
];

// ── SPORTS DATA ──────────────────────────────────────────
const SPORTS=[
  {team:'canucks',type:'score',opponent:'Oilers',home:true,teamScore:3,oppScore:2,status:'Final · OT',live:false},
  {team:'canucks',type:'news',hl:'Hughes named to All-Star roster; Demko cleared from IR ahead of playoffs',src:'Sportsnet',age:'1h',url:'https://sportsnet.ca'},
  {team:'canucks',type:'news',hl:'Boeser extension talks ongoing as team weighs cap flexibility heading into offseason',src:'The Athletic',age:'4h',url:'https://theathletic.com'},
  {team:'seahawks',type:'news',hl:'Seahawks sign veteran DL ahead of training camp; secondary depth also addressed',src:'ESPN',age:'2h',url:'https://espn.com'},
  {team:'seahawks',type:'news',hl:"Geno Smith contract talks stall; team exploring 2026 QB options in draft",src:'The Athletic',age:'6h',url:'https://theathletic.com'},
  {team:'bclions',type:'news',hl:'BC Lions open training camp with 12 roster additions; Maier takes first-team reps',src:'CFL.ca',age:'1h',url:'https://cfl.ca'},
  {team:'bclions',type:'news',hl:'CFL schedule released: Lions open season at home against Calgary on June 14',src:'CBC BC',age:'5h',url:'https://cbc.ca/bc'},
  {team:'bluejays',type:'score',opponent:'Red Sox',home:false,teamScore:6,oppScore:4,status:'Final',live:false},
  {team:'bluejays',type:'news',hl:'Vladdy Jr. homer streak reaches 7 games; on pace for career-best home run total',src:'Sportsnet',age:'3h',url:'https://sportsnet.ca'},
  {team:'raptors',type:'news',hl:'Raptors hold pre-draft workouts; five prospects visit OVO Athletic Centre',src:'TSN',age:'4h',url:'https://tsn.ca'},
  {team:'raptors',type:'news',hl:"Ujiri on rebuild timeline: 'We are building something sustainable and patient'",src:'Globe & Mail',age:'7h',url:'https://theglobeandmail.com'},
];

const TNAMES={canucks:'VAN',seahawks:'SEA',bclions:'BC',bluejays:'TOR',raptors:'TOR'};

function renderNews(){
  document.getElementById('news-list').innerHTML=NEWS.map(n=>`
    <a class="hl" href="${n.url}" target="_blank">
      <div class="hl-t">${n.hl}</div>
      <div class="hl-m"><span class="src-tag">${n.src}</span><span>·</span><span>${n.age} ago</span></div>
    </a>
  `).join('');
}

function renderSports(){
  const items=activeTeam==='all'?SPORTS:SPORTS.filter(s=>s.team===activeTeam);
  if(!items.length){
    document.getElementById('sports-list').innerHTML='<div class="empty">No recent updates</div>';
    return;
  }
  document.getElementById('sports-list').innerHTML=items.map(s=>{
    if(s.type==='score'){
      const tn=TNAMES[s.team]||s.team.toUpperCase().slice(0,3);
      const opp=s.opponent.slice(0,3).toUpperCase();
      const livePip=s.live?`<span class="live-dot" style="margin-left:4px"></span>`:'';
      return `<div class="scard">
        <div class="scard-hd">${s.status}${livePip}</div>
        <div class="steams">
          <div class="steam"><div class="steam-n">${tn}</div><div class="steam-s">${s.teamScore}</div></div>
          <div class="sdash">—</div>
          <div class="steam"><div class="steam-n">${opp}</div><div class="steam-s">${s.oppScore}</div></div>
        </div>
      </div>`;
    }
    return `<a class="hl" href="${s.url||'#'}" target="_blank">
      <div class="hl-t">${s.hl}</div>
      <div class="hl-m"><span class="src-tag">${s.src||''}</span><span>·</span><span>${s.age} ago</span></div>
    </a>`;
  }).join('');
}

renderNews();renderSports();

// ── NOTES ──────────────────────────────────────────────────
let notes=[];
try{notes=JSON.parse(localStorage.getItem('dash_notes')||'[]')}catch(e){}

function renderNotes(){
  const el=document.getElementById('notes-list');
  if(!notes.length){el.innerHTML='<div class="empty">No saved notes</div>';return}
  el.innerHTML=[...notes].reverse().map((n,ri)=>{
    const i=notes.length-1-ri;
    return `<div class="noterow">
      <span class="note-time">${n.t}</span>
      <span class="note-text">${escHtml(n.text)}</span>
      <button class="note-del" onclick="delNote(${i})" aria-label="Delete note">×</button>
    </div>`;
  }).join('');
}

function escHtml(s){
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function saveNote(){
  const el=document.getElementById('cap-input');
  const text=el.value.trim();
  if(!text)return;
  const now=new Date();
  const t=now.toLocaleTimeString('en-CA',{hour:'2-digit',minute:'2-digit'});
  notes.push({text,t});
  try{localStorage.setItem('dash_notes',JSON.stringify(notes))}catch(e){}
  el.value='';
  renderNotes();
}

function clearCap(){document.getElementById('cap-input').value=''}

function delNote(i){
  notes.splice(i,1);
  try{localStorage.setItem('dash_notes',JSON.stringify(notes))}catch(e){}
  renderNotes();
}

document.getElementById('cap-input').addEventListener('keydown',function(e){
  if(e.key==='Enter'&&(e.metaKey||e.ctrlKey)){saveNote()}
});

renderNotes();

// ── VOICE DICTATION ──────────────────────────────────────────
let rec=null,isRec=false;
function toggleVoice(){
  const btn=document.getElementById('voice-btn');
  const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  if(!SR){alert('Speech recognition unavailable. Try Chrome or the Tesla browser with microphone access.');return}
  if(isRec){
    rec&&rec.stop();
    return;
  }
  rec=new SR();
  rec.continuous=true;
  rec.interimResults=true;
  rec.lang='en-CA';
  let base=document.getElementById('cap-input').value;
  rec.onresult=function(e){
    let fin='',int='';
    for(let i=e.resultIndex;i<e.results.length;i++){
      if(e.results[i].isFinal)fin+=e.results[i][0].transcript;
      else int+=e.results[i][0].transcript;
    }
    base+=fin;
    document.getElementById('cap-input').value=base+int;
  };
  rec.onend=function(){
    isRec=false;
    btn.textContent='🎤 Dictate';
    btn.classList.remove('rec');
  };
  rec.onerror=function(){
    isRec=false;
    btn.textContent='🎤 Dictate';
    btn.classList.remove('rec');
  };
  rec.start();
  isRec=true;
  btn.textContent='⏹ Stop';
  btn.classList.add('rec');
}
</script>
</body>
</html>

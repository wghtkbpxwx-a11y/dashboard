<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Dashboard</title>
<style>
:root {
  --bg:        #04050a;
  --bg2:       #070912;
  --surface:   rgba(255,255,255,0.022);
  --surface2:  rgba(255,255,255,0.045);
  --glass:     rgba(12,16,28,0.55);
  --line:      rgba(255,255,255,0.055);
  --line2:     rgba(255,255,255,0.10);
  --t1:        #f3f6fc;
  --t2:        #97a2b6;
  --t3:        #565f73;
  --accent:    #6cb4ff;
  --accent2:   #3d7fe0;
  --accent-bg: rgba(108,180,255,0.10);
  --accent-b:  rgba(108,180,255,0.30);
  --glow:      rgba(108,180,255,0.45);
  --red:       #ff5d5d;
  --r:  16px;
  --rs: 12px;
  --f: -apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue',sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}

html{
  background:#04050a;
  /* deep-space horizon glow */
  background-image:
    radial-gradient(120% 80% at 50% -10%, rgba(108,180,255,0.10), transparent 60%),
    radial-gradient(90% 60% at 85% 8%, rgba(120,90,220,0.08), transparent 55%),
    linear-gradient(180deg,#070a14 0%,#04050a 45%,#020308 100%);
  background-attachment:fixed;
}

/* ── STARFIELD ── */
#stars{
  position:fixed;inset:0;z-index:0;pointer-events:none;
  background-image:
    radial-gradient(1.2px 1.2px at 12% 18%, rgba(255,255,255,0.55), transparent),
    radial-gradient(1px 1px at 28% 62%, rgba(255,255,255,0.35), transparent),
    radial-gradient(1.4px 1.4px at 44% 28%, rgba(255,255,255,0.45), transparent),
    radial-gradient(1px 1px at 62% 74%, rgba(255,255,255,0.30), transparent),
    radial-gradient(1.3px 1.3px at 76% 22%, rgba(200,220,255,0.55), transparent),
    radial-gradient(1px 1px at 88% 56%, rgba(255,255,255,0.32), transparent),
    radial-gradient(1.1px 1.1px at 18% 84%, rgba(255,255,255,0.30), transparent),
    radial-gradient(1.5px 1.5px at 54% 90%, rgba(180,210,255,0.40), transparent),
    radial-gradient(1px 1px at 8% 46%, rgba(255,255,255,0.28), transparent),
    radial-gradient(1.2px 1.2px at 70% 40%, rgba(255,255,255,0.40), transparent),
    radial-gradient(1px 1px at 36% 8%, rgba(255,255,255,0.30), transparent),
    radial-gradient(1.3px 1.3px at 94% 80%, rgba(200,220,255,0.42), transparent);
  background-repeat:no-repeat;
  animation:twinkle 6s ease-in-out infinite;
}
@keyframes twinkle{0%,100%{opacity:0.85}50%{opacity:0.55}}

body{
  position:relative;z-index:1;
  background:transparent;
  color:var(--t1);
  font-family:var(--f);
  min-height:100dvh;
  -webkit-font-smoothing:antialiased;
  overscroll-behavior:none;
  max-width:560px;
  margin:0 auto;
}
a{color:inherit;text-decoration:none}
button{font-family:var(--f);cursor:pointer}

/* ── STATUS BAR ── */
#status{
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:calc(env(safe-area-inset-top,0px) + 16px) 24px 16px;
  position:sticky;
  top:0;
  z-index:200;
  background:linear-gradient(180deg,rgba(4,5,10,0.92),rgba(4,5,10,0.65));
  backdrop-filter:blur(24px) saturate(140%);
  -webkit-backdrop-filter:blur(24px) saturate(140%);
  border-bottom:1px solid var(--line);
}
#s-left{display:flex;flex-direction:column;gap:3px}
#s-time{
  font-size:38px;font-weight:200;letter-spacing:-1px;line-height:1;
  font-variant-numeric:tabular-nums;
  text-shadow:0 0 24px rgba(108,180,255,0.25);
}
#s-date{font-size:13px;letter-spacing:2.4px;text-transform:uppercase;color:var(--t3);font-weight:500}
#s-right{display:flex;gap:10px;align-items:center}
.s-chip.live{
  font-size:12px;letter-spacing:1.6px;text-transform:uppercase;font-weight:600;
  color:var(--accent);
  display:flex;align-items:center;gap:7px;
  padding:7px 13px;border-radius:100px;
  background:var(--accent-bg);
  border:1px solid var(--accent-b);
}
.live-dot{
  width:6px;height:6px;border-radius:50%;
  background:var(--accent);
  box-shadow:0 0 8px var(--glow);
  animation:blink 2.4s infinite;
}
@keyframes blink{0%,100%{opacity:1;box-shadow:0 0 8px var(--glow)}55%{opacity:0.3;box-shadow:0 0 2px var(--glow)}}

/* ── MODE NAV ── */
#modenav{
  display:flex;
  gap:6px;
  padding:14px 20px;
  position:sticky;
  top:84px;
  z-index:199;
  background:linear-gradient(180deg,rgba(4,5,10,0.85),rgba(4,5,10,0.4));
  backdrop-filter:blur(16px);
  -webkit-backdrop-filter:blur(16px);
}
.modebt{
  flex:1;
  padding:13px 18px;
  border-radius:100px;
  border:1px solid transparent;
  background:var(--surface);
  color:var(--t3);
  font-size:14px;
  font-weight:600;
  letter-spacing:1.4px;
  text-transform:uppercase;
  transition:all .22s ease;
}
.modebt.on{
  background:linear-gradient(180deg,rgba(108,180,255,0.16),rgba(108,180,255,0.06));
  border-color:var(--accent-b);
  color:#fff;
  box-shadow:0 0 24px -6px var(--glow), inset 0 1px 0 rgba(255,255,255,0.08);
}
.modebt:not(.on):active{background:var(--surface2)}

/* ── PANELS ── */
#content{padding:6px 16px env(safe-area-inset-bottom,28px)}
.panel{display:none;animation:fadeIn .28s ease}
.panel.on{display:block}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}

/* ── SECTION LABEL ── */
.sec{
  padding:24px 8px 12px;
  font-size:11px;
  font-weight:600;
  letter-spacing:2.2px;
  text-transform:uppercase;
  color:var(--t3);
  display:flex;align-items:center;gap:10px;
}
.sec::after{content:"";flex:1;height:1px;background:linear-gradient(90deg,var(--line2),transparent)}

/* ── APP ROWS (glass card group) ── */
.cardgroup{
  background:var(--glass);
  border:1px solid var(--line);
  border-radius:var(--r);
  overflow:hidden;
  backdrop-filter:blur(12px);
  -webkit-backdrop-filter:blur(12px);
}
.row{
  display:flex;
  align-items:center;
  padding:16px 18px;
  border-bottom:1px solid var(--line);
  gap:16px;
  transition:background .16s;
  color:inherit;
}
.row:last-child{border-bottom:none}
.row:active{background:var(--surface2)}

/* ── REAL APP ICONS ── */
.appicon{
  width:52px;height:52px;
  border-radius:15px;
  flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
  position:relative;
  box-shadow:inset 0 1px 0 rgba(255,255,255,0.18);
}
.appicon svg{width:30px;height:30px;display:block}
.ic-wa{background:linear-gradient(150deg,#2af34f 0%,#23c95c 45%,#0fa362 100%)}
.ic-wa{box-shadow:inset 0 1px 0 rgba(255,255,255,0.25),0 8px 22px -8px rgba(37,211,102,0.6)}
.ic-tg{background:linear-gradient(150deg,#3ec6ff 0%,#1d9bdf 60%,#0d83c4 100%);box-shadow:inset 0 1px 0 rgba(255,255,255,0.25),0 8px 22px -8px rgba(45,171,238,0.6)}
.ic-ms{background:linear-gradient(150deg,#00c6ff 0%,#0a7cff 42%,#9a3df0 100%);box-shadow:inset 0 1px 0 rgba(255,255,255,0.25),0 8px 22px -8px rgba(98,103,255,0.6)}
.ic-gm{background:linear-gradient(150deg,#ffffff,#f1f3f6);box-shadow:inset 0 1px 0 rgba(255,255,255,0.9),0 8px 22px -8px rgba(234,67,53,0.45)}

.rl{flex:1;min-width:0}
.rl-t{font-size:19px;font-weight:600;color:var(--t1);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;letter-spacing:-0.2px}
.rl-s{font-size:13px;color:var(--t3);margin-top:3px;letter-spacing:0.2px}
.chev{color:var(--t3);font-size:22px;line-height:1;flex-shrink:0;font-weight:300}

/* ── INNER TABS ── */
.itabs{
  display:flex;
  gap:8px;
  padding:6px 8px 14px;
}
.itab{
  padding:10px 22px;
  border-radius:100px;
  font-size:14px;
  font-weight:600;
  letter-spacing:1px;
  text-transform:uppercase;
  color:var(--t3);
  background:var(--surface);
  border:1px solid transparent;
  transition:all .2s;
}
.itab.on{
  color:#fff;
  background:var(--accent-bg);
  border-color:var(--accent-b);
  box-shadow:0 0 18px -6px var(--glow);
}

/* ── NEWS HEADLINES ── */
.hl{
  display:block;
  padding:16px 18px;
  border-bottom:1px solid var(--line);
  transition:background .16s;
}
.hl:last-child{border-bottom:none}
.hl:active{background:var(--surface2)}
.hl-t{font-size:17px;line-height:1.42;color:var(--t1);font-weight:500;letter-spacing:-0.1px}
.hl-m{font-size:12px;color:var(--t3);margin-top:8px;display:flex;gap:7px;align-items:center;letter-spacing:0.4px;text-transform:uppercase}
.src-tag{color:var(--accent)}

.subhead{
  padding:4px 8px 12px;
  display:flex;align-items:center;gap:9px;
  font-size:11px;letter-spacing:2.2px;text-transform:uppercase;color:var(--t3);font-weight:600;
}

/* ── TEAM CHIPS ── */
.teamfilter{
  display:flex;gap:8px;
  padding:4px 2px 16px;
  overflow-x:auto;scrollbar-width:none;
}
.teamfilter::-webkit-scrollbar{display:none}
.tchip{
  flex-shrink:0;
  padding:9px 16px;
  border-radius:100px;
  border:1px solid var(--line2);
  background:var(--surface);
  color:var(--t2);
  font-size:13px;
  font-weight:600;
  letter-spacing:0.4px;
  transition:all .2s;
}
.tchip.on{
  background:var(--accent-bg);
  border-color:var(--accent-b);
  color:var(--accent);
  box-shadow:0 0 16px -6px var(--glow);
}

/* ── SCORE CARD ── */
.scard{
  margin-bottom:12px;
  padding:18px 20px;
  background:var(--glass);
  border:1px solid var(--line);
  border-radius:var(--r);
  backdrop-filter:blur(12px);
  -webkit-backdrop-filter:blur(12px);
}
.scard-hd{
  font-size:11px;text-transform:uppercase;letter-spacing:1.6px;
  color:var(--t3);margin-bottom:14px;display:flex;align-items:center;gap:8px;font-weight:600;
}
.steams{display:flex;align-items:center;justify-content:space-between}
.steam{text-align:center;flex:1}
.steam-n{font-size:14px;font-weight:600;color:var(--t2);letter-spacing:1px;text-transform:uppercase}
.steam-s{
  font-size:48px;font-weight:200;letter-spacing:-2px;color:var(--t1);line-height:1.1;margin-top:4px;
  font-variant-numeric:tabular-nums;
  text-shadow:0 0 20px rgba(108,180,255,0.2);
}
.sdash{font-size:18px;color:var(--t3);padding:0 14px;font-weight:200}

/* ── CAPTURE ── */
.capbox{
  width:100%;
  background:var(--glass);
  border:1px solid var(--line2);
  border-radius:var(--r);
  color:var(--t1);
  font-family:var(--f);
  font-size:18px;
  line-height:1.55;
  padding:18px 20px;
  min-height:150px;
  resize:none;
  outline:none;
  transition:border-color .2s,box-shadow .2s;
  backdrop-filter:blur(12px);
  -webkit-backdrop-filter:blur(12px);
}
.capbox:focus{border-color:var(--accent-b);box-shadow:0 0 28px -10px var(--glow)}
.capbox::placeholder{color:var(--t3)}
.capbtns{display:flex;gap:10px;margin-top:12px}
.btn{
  padding:14px 22px;border-radius:100px;
  border:1px solid transparent;font-size:15px;font-weight:600;letter-spacing:0.4px;
  transition:all .18s;
}
.btn-pri{
  background:linear-gradient(180deg,var(--accent),var(--accent2));
  color:#fff;
  box-shadow:0 0 24px -8px var(--glow);
}
.btn-pri:active{transform:scale(0.97)}
.btn-ghost{background:var(--surface);color:var(--t2);border-color:var(--line2)}
.btn-ghost:active{background:var(--surface2)}
.btn-voice{
  display:flex;align-items:center;gap:6px;margin-left:auto;
}
.btn-voice.rec{
  background:rgba(255,93,93,0.12);
  color:var(--red);
  border-color:rgba(255,93,93,0.35);
  box-shadow:0 0 20px -8px rgba(255,93,93,0.6);
}

/* ── NOTES LIST ── */
.noterow{
  display:flex;align-items:flex-start;
  padding:15px 18px;border-bottom:1px solid var(--line);
  gap:14px;
}
.noterow:last-child{border-bottom:none}
.note-time{font-size:12px;color:var(--accent);flex-shrink:0;padding-top:3px;letter-spacing:0.5px;font-variant-numeric:tabular-nums}
.note-text{flex:1;font-size:16px;color:var(--t1);line-height:1.5}
.note-del{
  background:none;border:none;
  color:var(--t3);font-size:22px;line-height:1;
  flex-shrink:0;padding:0 4px;cursor:pointer;
  transition:color .15s;
}
.note-del:active{color:var(--red)}

/* ── EMPTY ── */
.empty{padding:32px;font-size:14px;color:var(--t3);text-align:center;letter-spacing:0.4px}

/* ── SCROLLBAR ── */
::-webkit-scrollbar{width:3px;height:3px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--line2);border-radius:3px}
</style>
</head>
<body>

<div id="stars"></div>

<!-- ══ STATUS BAR ══ -->
<header id="status">
  <div id="s-left">
    <div id="s-time">--:--</div>
    <div id="s-date">———</div>
  </div>
  <div id="s-right">
    <span class="s-chip live"><span class="live-dot"></span>Live</span>
  </div>
</header>

<!-- ══ MODE NAV ══ -->
<nav id="modenav">
  <button class="modebt on" data-p="live">Live</button>
  <button class="modebt" data-p="msg">Messages</button>
  <button class="modebt" data-p="cap">Capture</button>
</nav>

<main id="content">

<!-- ══════════════════════════
     LIVE PANEL (NEWS + SPORTS)
══════════════════════════ -->
<section class="panel on" id="panel-live">

  <div class="itabs">
    <div class="itab on" data-sub="news">News</div>
    <div class="itab" data-sub="sports">Sports</div>
  </div>

  <!-- News sub-panel -->
  <div id="sub-news">
    <div class="subhead"><span class="live-dot"></span>Headlines</div>
    <div class="cardgroup" id="news-list"></div>
    <!--
      SWAP FEEDS: Replace NEWS array in JS below with fetched data.
      Recommended sources: CBC RSS, Globe & Mail, Reuters, AP News.
    -->
  </div>

  <!-- Sports sub-panel -->
  <div id="sub-sports" style="display:none">
    <div class="teamfilter">
      <button class="tchip on" data-team="all">All</button>
      <button class="tchip" data-team="canucks">Canucks</button>

      <button class="tchip" data-team="bclions">BC Lions</button>
      <button class="tchip" data-team="bluejays">Blue Jays</button>
      <button class="tchip" data-team="raptors">Raptors</button>
    </div>
    <div id="sports-list"></div>
    <!--
      SWAP SPORTS DATA: Replace SPORTS array in JS with live data.
    -->
  </div>

</section>

  <div class="sec">Email</div>
  <div class="cardgroup">
    <a class="row" href="https://mail.google.com" target="_blank">
      <div class="appicon ic-gm">

      </div>
      <div class="rl"><div class="rl-t">Gmail</div><div class="rl-s">Open inbox</div></div>
      <span class="chev">›</span>
    </a>
  </div>

</section>

<!-- ══════════════════════════
     CAPTURE PANEL
══════════════════════════ -->
<section class="panel" id="panel-cap">

  <div class="sec">Capture</div>
  <textarea
    class="capbox"
    id="cap-input"
    placeholder="Speak or type a thought…"
    rows="5"
    autocorrect="on"
    autocapitalize="sentences"
  ></textarea>
  <div class="capbtns">
    <button class="btn btn-pri" onclick="saveNote()">Save</button>
    <button class="btn btn-ghost" onclick="clearCap()">Clear</button>
    <button class="btn btn-voice btn-ghost" id="voice-btn" onclick="toggleVoice()">🎤 Dictate</button>
  </div>

  <div class="sec">Saved</div>
  <div class="cardgroup" id="notes-list"></div>

</section>

</main>

<script>
// ── CLOCK ───────────────────────────────────
function tick(){
  const n=new Date();
  const h=String(n.getHours()).padStart(2,'0');
  const m=String(n.getMinutes()).padStart(2,'0');
  const ts=h+':'+m;
  const ds=n.toLocaleDateString('en-CA',{weekday:'short',month:'short',day:'numeric'}).toUpperCase();
  document.getElementById('s-time').textContent=ts;
  document.getElementById('s-date').textContent=ds;
}
tick();setInterval(tick,15000);

// ── PANEL SWITCHING ──────────────────────────────
function switchPanel(id){
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('on'));
  document.querySelectorAll('.modebt').forEach(b=>b.classList.remove('on'));
  document.getElementById('panel-'+id).classList.add('on');
  document.querySelector('[data-p="'+id+'"]').classList.add('on');
}
document.querySelectorAll('.modebt').forEach(btn=>{
  btn.addEventListener('click',()=>switchPanel(btn.dataset.p));
});

// ── INNER TABS ──────────────────────────────────
document.querySelectorAll('.itab').forEach(tab=>{
  tab.addEventListener('click',()=>{
    document.querySelectorAll('.itab').forEach(t=>t.classList.remove('on'));
    tab.classList.add('on');
    document.getElementById('sub-news').style.display=tab.dataset.sub==='news'?'block':'none';
    document.getElementById('sub-sports').style.display=tab.dataset.sub==='sports'?'block':'none';
  });
});

// ── TEAM FILTER ─────────────────────────────────
let activeTeam='all';
document.querySelectorAll('.tchip').forEach(c=>{
  c.addEventListener('click',()=>{
    document.querySelectorAll('.tchip').forEach(x=>x.classList.remove('on'));
    c.classList.add('on');
    activeTeam=c.dataset.team;
    renderSports();
  });
});

// ── NEWS DATA ──────────────────────────────────────
// SWAP: Replace this array with a fetched/parsed RSS feed.
// Each item: { hl, src, age, url }
const NEWS=[
  {hl:'Federal budget passes third reading amid housing and infrastructure debate',src:'CBC',age:'8m',url:'https://cbc.ca'},
  {hl:'Bank of Canada holds rates steady, signals cautious outlook through year-end',src:'Globe & Mail',age:'31m',url:'https://theglobeandmail.com'},
  {hl:'Vancouver home sales edge higher but prices remain below year-ago levels',src:'Vancouver Sun',age:'1h',url:'https://vancouversun.com'},
  {hl:'Trans Mountain pipeline expansion reaches full operational capacity',src:'CBC BC',age:'2h',url:'https://cbc.ca/bc'},
  {hl:'US-Canada trade framework talks advance; auto sector exemptions near deal',src:'Reuters',age:'3h',url:'https://reuters.com'},
  {hl:'Pacific Northwest drought conditions worsen as June heat ridge builds',src:'Seattle Times',age:'4h',url:'https://seattletimes.com'},
  {hl:'AI hiring surge slows as enterprise budgets reset for second half of year',src:'The Verge',age:'5h',url:'https://theverge.com'},
];

// ── SPORTS DATA ───────────────────────────────────────
// SWAP: Replace with live data from ESPN, Sportsnet, TheSportsDB, or similar.
// type: 'score' | 'news'
const SPORTS=[
  {team:'canucks',type:'score',opponent:'Oilers',home:true,teamScore:3,oppScore:2,status:'Final · OT',live:false},
  {team:'canucks',type:'news',hl:'Hughes named to All-Star roster; Demko cleared from IR ahead of playoffs',src:'Sportsnet',age:'1h',url:'https://sportsnet.ca'},
  {team:'canucks',type:'news',hl:'Boeser extension talks ongoing as team weighs cap flexibility heading into offseason',src:'The Athletic',age:'4h',url:'https://theathletic.com'},
  {team:'seahawks',type:'news',hl:'Seahawks sign veteran DL ahead of training camp; secondary depth also addressed',src:'ESPN',age:'2h',url:'https://espn.com'},
  {team:'seahawks',type:'news',hl:"Geno Smith contract talks stall; team exploring 2026 QB options in draft",src:'The Athletic',age:'6h',url:'https://theathletic.com'},
  {team:'bclions',type:'news',hl:'BC Lions open training camp with 12 roster additions; Maier takes first-team reps',src:'CFL.ca',age:'1h',url:'https://cfl.ca'},
  {team:'bclions',type:'news',hl:'CFL schedule released: Lions open season at home against Calgary on June 14',src:'CBC BC',age:'5h',url:'https://cbc.ca/bc'},
  {team:'bluejays',type:'score',opponent:'Red Sox',home:false,teamScore:6,oppScore:4,status:'Final',live:false},
  {team:'bluejays',type:'news',hl:'Vladdy Jr. homer streak reaches 7 games; on pace for career-best home run total',src:'Sportsnet',age:'3h',url:'https://sportsnet.ca'},
  {team:'raptors',type:'news',hl:'Raptors hold pre-draft workouts; five prospects visit OVO Athletic Centre',src:'TSN',age:'4h',url:'https://tsn.ca'},
  {team:'raptors',type:'news',hl:"Ujiri on rebuild timeline: 'We are building something sustainable and patient'",src:'Globe & Mail',age:'7h',url:'https://theglobeandmail.com'},
];

const TNAMES={canucks:'VAN',seahawks:'SEA',bclions:'BC',bluejays:'TOR',raptors:'TOR'};

function renderNews(){
  document.getElementById('news-list').innerHTML=NEWS.map(n=>`
    <a class="hl" href="${n.url}" target="_blank">
      <div class="hl-t">${n.hl}</div>
      <div class="hl-m"><span class="src-tag">${n.src}</span><span>·</span><span>${n.age} ago</span></div>
    </a>
  `).join('');
}

function renderSports(){
  const items=activeTeam==='all'?SPORTS:SPORTS.filter(s=>s.team===activeTeam);
  if(!items.length){
    document.getElementById('sports-list').innerHTML='<div class="empty">No recent updates</div>';
    return;
  }
  document.getElementById('sports-list').innerHTML=items.map(s=>{
    if(s.type==='score'){
      const tn=TNAMES[s.team]||s.team.toUpperCase().slice(0,3);
      const opp=s.opponent.slice(0,3).toUpperCase();
      const livePip=s.live?`<span class="live-dot" style="margin-left:4px"></span>`:'';
      return `<div class="scard">
        <div class="scard-hd">${s.status}${livePip}</div>
        <div class="steams">
          <div class="steam"><div class="steam-n">${tn}</div><div class="steam-s">${s.teamScore}</div></div>
          <div class="sdash">—</div>
          <div class="steam"><div class="steam-n">${opp}</div><div class="steam-s">${s.oppScore}</div></div>
        </div>
      </div>`;
    }
    return `<a class="hl" href="${s.url||'#'}" target="_blank" style="border:1px solid var(--line);border-radius:var(--r);margin-bottom:12px;background:var(--glass)">
      <div class="hl-t">${s.hl}</div>
      <div class="hl-m"><span class="src-tag">${s.src||''}</span><span>·</span><span>${s.age} ago</span></div>
    </a>`;
  }).join('');
}

renderNews();renderSports();

// ── NOTES ───────────────────────────────────────
let notes=[];
try{notes=JSON.parse(localStorage.getItem('dash_notes')||'[]')}catch(e){}

function renderNotes(){
  const el=document.getElementById('notes-list');
  if(!notes.length){el.innerHTML='<div class="empty">No saved notes</div>';return}
  el.innerHTML=[...notes].reverse().map((n,ri)=>{
    const i=notes.length-1-ri;
    return `<div class="noterow">
      <span class="note-time">${n.t}</span>
      <span class="note-text">${escHtml(n.text)}</span>
      <button class="note-del" onclick="delNote(${i})" aria-label="Delete note">×</button>
    </div>`;
  }).join('');
}

function escHtml(s){
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function saveNote(){
  const el=document.getElementById('cap-input');
  const text=el.value.trim();
  if(!text)return;
  const now=new Date();
  const t=now.toLocaleTimeString('en-CA',{hour:'2-digit',minute:'2-digit'});
  notes.push({text,t});
  try{localStorage.setItem('dash_notes',JSON.stringify(notes))}catch(e){}
  el.value='';
  renderNotes();
}

function clearCap(){document.getElementById('cap-input').value=''}

function delNote(i){
  notes.splice(i,1);
  try{localStorage.setItem('dash_notes',JSON.stringify(notes))}catch(e){}
  renderNotes();
}

document.getElementById('cap-input').addEventListener('keydown',function(e){
  if(e.key==='Enter'&&(e.metaKey||e.ctrlKey)){saveNote()}
});

renderNotes();

// ── VOICE DICTATION ───────────────────────────────────────────
let rec=null,isRec=false;
function toggleVoice(){
  const btn=document.getElementById('voice-btn');
  const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  if(!SR){alert('Speech recognition unavailable. Try Chrome or the Tesla browser with microphone access.');return}
  if(isRec){
    rec&&rec.stop();
    return;
  }
  rec=new SR();
  rec.continuous=true;
  rec.interimResults=true;
  rec.lang='en-CA';
  let base=document.getElementById('cap-input').value;
  rec.onresult=function(e){
    let fin='',int='';
    for(let i=e.resultIndex;i<e.results.length;i++){
      if(e.results[i].isFinal)fin+=e.results[i][0].transcript;
      else int+=e.results[i][0].transcript;
    }
    base+=fin;
    document.getElementById('cap-input').value=base+int;
  };
  rec.onend=function(){
    isRec=false;
    btn.textContent='🎤 Dictate';
    btn.classList.remove('rec');
  };
  rec.onerror=function(){
    isRec=false;
    btn.textContent='🎤 Dictate';
    btn.classList.remove('rec');
  };
  rec.start();
  isRec=true;
  btn.textContent='⏹ Stop';
  btn.classList.add('rec');
}
</script>
</body>
</html>
